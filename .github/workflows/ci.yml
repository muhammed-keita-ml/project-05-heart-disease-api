# .github/workflows/ci.yml
# GitHub Actions CI/CD pipeline.
# Runs automatically on every push to main branch.
# WHY: Automated testing prevents broken code reaching production.

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

      - name: Build Docker image
        run: docker build -t heart-disease-api .